service: daily-scraper #Change this

provider:
  name: aws
  runtime: python3.10
  stage: ${opt:stage, 'prod'} # Defaults to prod if a stage is not found
  region: ${env:AWS_REGION, 'us-east-2'} # Uses the environment if set in your AWS CLI credentials
  profile: secondary
  iam:
    # Grants full access to all AWS services and resources
    role:
      statements:
        - Effect: Allow
          Action: '*'
          Resource: '*'
  ecr:
    images:
      my-task:
        path: ./
        platform: linux/amd64
  vpc:
    securityGroupIds:
      - sg-01fdd78a401e81cbe
    subnetIds:
      - subnet-0c710cf5cf5cc2c4d
resources:
  Resources:
    FargateTaskDefinition:
      Type: AWS::ECS::TaskDefinition
      Properties:
        Family: daily-scraper #Change this task
        Cpu: '4096'
        Memory: '16384'
        NetworkMode: awsvpc
        RequiresCompatibilities:
          - FARGATE
        ExecutionRoleArn: !GetAtt ECSExecutionRole.Arn
        TaskRoleArn: !GetAtt ECSExecutionRole.Arn 
        ContainerDefinitions:
          - Name: my-task-container
            Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${self:service}-${self:provider.stage}:latest
            Essential: true
            Command:
              - python3
              - test.py
            LogConfiguration:
              LogDriver: awslogs
              Options:
                awslogs-create-group: "true"
                awslogs-group: /ecs/daily-scraper  #Change the name to match the task
                awslogs-region: ${self:provider.region} 
                awslogs-stream-prefix: ecs
                max-buffer-size: "25m"
    ECSExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service:
                  - ecs-tasks.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: ECSTaskExecutionRolePolicy
            PolicyDocument:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - ecr:GetDownloadUrlForLayer
                    - ecr:BatchGetImage
                    - ecr:GetAuthorizationToken
                    - logs:CreateLogStream
                    - logs:PutLogEvents
                    - logs:CreateLogGroup
                    - s3:GetObject
                    - s3:ListBucket
                  Resource: '*'